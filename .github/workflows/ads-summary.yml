name: Send Ads Summary

on:
  schedule:
    # Tous les lundis à 9h00 UTC (10h00 heure de Paris)
    - cron: '0 9 * * 1'
  workflow_dispatch: # Permet de déclencher manuellement depuis GitHub

jobs:
  send-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Send ads summary emails
        run: |
          echo "🚀 Envoi des récapitulatifs d'annonces..."
          echo "📅 Date et heure: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "📧 Script: scripts/send-ads-summary.ts"

          # Vérifier que les variables d'environnement sont définies
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "❌ DATABASE_URL non défini dans les secrets GitHub"
            exit 1
          fi
          echo "🗄️ Base de données configurée: oui"

          if [ -z "${{ secrets.SMTP_USER }}" ]; then
            echo "❌ SMTP_USER non défini dans les secrets GitHub"
            exit 1
          fi
          echo "📧 Configuration SMTP configurée: oui"

          # Exécuter le script
          echo "📡 Exécution du script..."
          npx tsx scripts/send-ads-summary.ts
          exit_code=$?

          if [ $exit_code -eq 0 ]; then
            echo "✅ Récapitulatifs d'annonces envoyés avec succès"
            echo "🎉 Workflow terminé avec succès"
          else
            echo "❌ Erreur lors de l'envoi des récapitulatifs (code de sortie: $exit_code)"
            echo "🔍 Vérifiez les logs pour plus de détails"
            exit 1
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NEXT_PUBLIC_SITE_URL: https://dragonfly-livid.vercel.app

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Échec de l'envoi des récapitulatifs d'annonces"
          echo "Vérifiez les logs et la configuration"
