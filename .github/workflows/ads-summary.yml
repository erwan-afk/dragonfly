name: Ads Summary 

on:
  schedule:
    # Tous les jours à 9h00 UTC (10h Paris hiver / 11h été)
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Send renewal reminder emails
        run: |
          echo "🚀 Envoi des rappels de renouvellement d'annonces..."
          echo "📅 Date et heure: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "📧 Script: scripts/send-renewal-reminders.ts"

          # Vérification des variables d'environnement
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "❌ DATABASE_URL non défini dans les secrets GitHub"
            exit 1
          fi
          echo "🗄️ Base de données configurée: oui"

          if [ -z "${{ secrets.SMTP_USER }}" ]; then
            echo "❌ SMTP_USER non défini dans les secrets GitHub"
            exit 1
          fi
          echo "📧 Configuration SMTP configurée: oui"

          # Exécution du script
          echo "📡 Exécution du script..."
          npx tsx scripts/send-renewal-reminders.ts
          exit_code=$?

          if [ $exit_code -eq 0 ]; then
            echo "✅ Rappels de renouvellement envoyés avec succès"
            echo "🎉 Workflow terminé avec succès"
          else
            echo "❌ Erreur lors de l'envoi des rappels (code de sortie: $exit_code)"
            echo "🔍 Vérifiez les logs pour plus de détails"
            exit 1
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NEXT_PUBLIC_SITE_URL: https://dragonfly-livid.vercel.app

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Échec de l'envoi des rappels de renouvellement"
          echo "Vérifiez les logs et la configuration"
