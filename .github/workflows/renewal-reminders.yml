name: Send Renewal Reminders

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Send renewal reminders
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NEXT_PUBLIC_SITE_URL: https://dragonfly-trimarans.org
        run: |
          echo "🚀 Envoi des rappels de renouvellement..."
          npm run tsx scripts/send-renewal-reminders.ts
