name: 🚀 Deploy to Production

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm ci --legacy-peer-deps

    - name: 🔨 Generate Prisma client
      run: npx prisma generate

    - name: 🏗️ Build application
      run: npm run build

    - name: 🚀 Deploy to server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          cd /var/www/dragonfly

          # Sauvegarder la version actuelle
          echo "📦 Sauvegarde de la version actuelle..."
          BACKUP_NAME="backup_$(date +%Y%m%d_%H%M%S)"
          cp -r /var/www/dragonfly "/var/www/${BACKUP_NAME}"

          # Arrêter les conteneurs
          echo "🛑 Arrêt des conteneurs..."
          docker-compose down

          # Nettoyer les anciennes images
          echo "🧹 Nettoyage..."
          docker system prune -f

          # Redémarrer l'application
          echo "🚀 Redémarrage de l'application..."
          docker-compose up -d

          # Attendre que l'application soit prête
          echo "⏳ Attente du démarrage..."
          sleep 10

          # Vérifier que l'application fonctionne
          if curl -f http://localhost:3000 > /dev/null 2>&1; then
            echo "✅ Déploiement réussi !"
            echo "🌐 Application accessible sur http://localhost:3000"

            # Supprimer les anciennes sauvegardes (garder seulement les 3 dernières)
            cd /var/www
            ls -t backup_* | tail -n +4 | xargs -r rm -rf
          else
            echo "❌ Échec du déploiement - Restauration..."

            # Restaurer la sauvegarde
            docker-compose down
            rm -rf /var/www/dragonfly
            mv "/var/www/${BACKUP_NAME}" /var/www/dragonfly
            docker-compose up -d

            exit 1
          fi
